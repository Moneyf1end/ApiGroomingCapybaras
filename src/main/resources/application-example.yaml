spring:
  datasource:
    url: jdbc:postgresql://localhost:YOUR_PORT/YOUR_DATABASE
    username: postgres
    password: "YOUR_PASSWORD"
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true # Convenient showing sql requests in console
    hibernate:
      ddl-auto: update # Spring gonna create/update table to suit your Java-class by its self
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
